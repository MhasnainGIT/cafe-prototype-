<!DOCTYPE html>
<html>
  <head>
    <title>Flynn Cafe - AR (Webhaze marker)</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.8/aframe/build/aframe-ar.js"></script>
    <script src="gesture-detector.js"></script>
    <script src="gesture-handler-2.js"></script>
    <script src="ar-model-loader.js"></script>
    <style>
      html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; background: #000; }
      .arjs-video, body > video {
        position: fixed !important; inset: 0 !important;
        width: 100vw !important; height: 100vh !important;
        object-fit: cover !important; z-index: 1 !important;
      }
      a-scene, canvas.a-canvas {
        position: fixed !important; inset: 0 !important;
        z-index: 2 !important; background: transparent !important;
      }
      #hint {
        position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.6); color: #fff; padding: 8px 18px;
        border-radius: 20px; font-family: Arial, sans-serif; font-size: 14px;
        z-index: 99999; pointer-events: none;
      }
      #hint.found { background: rgba(40,140,60,0.9); }
    </style>
  </head>
  <body>
    <div id="hint">Starting camera…</div>
    <a-scene
      arjs="sourceType: webcam; debugUIEnabled: false;"
      embedded
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false"
      gesture-detector
      renderer="alpha: true; antialias: true; logarithmicDepthBuffer: true;"
      id="scene"
    >
      <a-marker
        type="pattern"
        url="pattern-webhaze_logo_6.patt"
        emitevents="true"
        id="ar-marker"
      >
        <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.8" position="0 1 1"></a-light>
        <a-entity
          id="dish-entity"
          ar-gltf-model="src: Sushi_Platter.glb; position: 0 0 0"
          ar-auto-rotate="speed: 12"
          gesture-handler="minScale: 0.5; maxScale: 6; rotationFactor: 4"
        ></a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
    <script>
      (function () {
        var scene = document.getElementById('scene');
        var marker = document.getElementById('ar-marker');
        var hint = document.getElementById('hint');
        function fixLayers() {
          document.querySelectorAll('video').forEach(function (v) {
            v.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;z-index:1;';
            v.muted = true;
          });
          if (scene.renderer) scene.renderer.setClearColor(0x000000, 0);
        }
        scene.addEventListener('loaded', function () { fixLayers(); setInterval(fixLayers, 800); });
        marker.addEventListener('markerFound', function () {
          hint.textContent = 'Webhaze marker found';
          hint.classList.add('found');
        });
        marker.addEventListener('markerLost', function () {
          hint.textContent = 'Point at Webhaze logo (not Hiro)';
          hint.classList.remove('found');
        });
        document.getElementById('dish-entity').addEventListener('model-loaded', function () {
          hint.textContent = 'Point at Webhaze logo';
        });
      })();
    </script>
  </body>
</html>
